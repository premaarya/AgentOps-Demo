name: Contract AgentOps Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/contract-agentops-deploy.yml"
      - "contract-agentops-demo/**"
  workflow_dispatch:
    inputs:
      demo_mode:
        description: "Deployment mode"
        required: true
        type: choice
        default: live
        options:
          - simulated
          - live
      environment_name:
        description: "azd environment name"
        required: true
        type: string
        default: contract-agentops-prod
      azure_location:
        description: "Azure region"
        required: true
        type: string
        default: eastus2
      foundry_model:
        description: "Foundry deployment name"
        required: true
        type: string
        default: gpt-4o
      foundry_model_version:
        description: "Azure OpenAI model version used if the deployment must be created"
        required: true
        type: string
        default: 2024-11-20

permissions:
  contents: read

concurrency:
  group: contract-agentops-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: contract-agentops-demo

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contract-agentops-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    defaults:
      run:
        working-directory: contract-agentops-demo
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contract-agentops-demo/package-lock.json

      - name: Install Azure Developer CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v azd >/dev/null 2>&1; then
            curl -fsSL https://aka.ms/install-azd.sh | bash
            echo "$HOME/.azd/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.azd/bin:$PATH"
          fi
          azd version

      - name: Verify Azure CLI
        shell: bash
        run: |
          set -euo pipefail
          az version

      - name: Azure login with service principal
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Resolve deployment settings
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          demo_mode="live"
          environment_name="contract-agentops-main"
          azure_location="eastus2"
          foundry_model="gpt-4o"
          foundry_model_version="2024-11-20"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            demo_mode="${{ github.event.inputs.demo_mode }}"
            environment_name="${{ github.event.inputs.environment_name }}"
            azure_location="${{ github.event.inputs.azure_location }}"
            foundry_model="${{ github.event.inputs.foundry_model }}"
            foundry_model_version="${{ github.event.inputs.foundry_model_version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            environment_name="contract-agentops-prod"
          fi

          deploy_admin_key="$(openssl rand -hex 32)"

          {
            echo "demo_mode=${demo_mode}"
            echo "environment_name=${environment_name}"
            echo "azure_location=${azure_location}"
            echo "foundry_model=${foundry_model}"
            echo "foundry_model_version=${foundry_model_version}"
            echo "deploy_admin_key=${deploy_admin_key}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare azd environment
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"
          azd env select "${{ steps.resolve.outputs.environment_name }}" || azd env new "${{ steps.resolve.outputs.environment_name }}"
          azd env set AZURE_LOCATION "${{ steps.resolve.outputs.azure_location }}"
          azd env set FOUNDRY_MODEL "${{ steps.resolve.outputs.foundry_model }}"
          azd env set FOUNDRY_MODEL_VERSION "${{ steps.resolve.outputs.foundry_model_version }}"
          azd env set DEPLOY_ADMIN_KEY "${{ steps.resolve.outputs.deploy_admin_key }}"
          azd env set DEMO_MODE "${{ steps.resolve.outputs.demo_mode }}"

      - name: Provision infrastructure
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"
          azd provision --no-prompt

      - name: Ensure Foundry model deployment exists
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"

          resource_group="$(azd env get-value AZURE_RESOURCE_GROUP)"
          account_name="$(azd env get-value AZURE_FOUNDRY_ACCOUNT_NAME)"
          deployment_name="$(azd env get-value AZURE_FOUNDRY_DEPLOYMENT_NAME)"
          model_name="${{ steps.resolve.outputs.foundry_model }}"
          model_version="${{ steps.resolve.outputs.foundry_model_version }}"

          if az cognitiveservices account deployment show \
            --resource-group "$resource_group" \
            --name "$account_name" \
            --deployment-name "$deployment_name" >/dev/null 2>&1; then
            echo "Reusing existing Foundry deployment '$deployment_name' on account '$account_name'."
            exit 0
          fi

          echo "Creating Foundry deployment '$deployment_name' on account '$account_name'."
          az cognitiveservices account deployment create \
            --resource-group "$resource_group" \
            --name "$account_name" \
            --deployment-name "$deployment_name" \
            --model-format OpenAI \
            --model-name "$model_name" \
            --model-version "$model_version" \
            --sku-name Standard \
            --sku-capacity 10

      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.azd/bin:$PATH"
          azd deploy --no-prompt

      - name: Verify deployed application
        shell: pwsh
        run: |
          $appUrl = azd env get-value AZURE_APP_SERVICE_URL
          ./scripts/deploy/verify-deployment.ps1 -AppUrl $appUrl