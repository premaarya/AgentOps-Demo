# Declarative Agent Configuration - Analytics Agent

agent_id: analytics
name: Contract Analytics Agent
version: 1.0.0
created: 2026-03-12

model:
  provider: microsoft_foundry
  name: gpt-5.1-2026-01-15
  temperature: 0.0
  max_tokens: 2048
  top_p: 1.0
  response_format: json_schema
  timeout: 30s

prompts:
  system_prompt: prompts/analytics-system.md
  output_template: templates/approval-result.json

tools:
  - name: run_evaluation
    mcp_server: contract-eval-mcp
    description: Evaluate lifecycle performance and quality signals
    required: true
    timeout: 15s
  - name: get_baseline
    mcp_server: contract-eval-mcp
    description: Compare current outcomes to the baseline
    required: false
    timeout: 10s

behavior:
  role: "Summarize lifecycle outcomes, evaluation metrics, and portfolio insights"
  boundary: "Analytics only - no workflow mutation or approval overrides"
  output_schema: config/schemas/analytics-result.json
  validation:
    required_fields: [portfolio_summary, key_metrics, recommended_actions]
    confidence_threshold: 0.7
  retry_policy:
    max_attempts: 3
    backoff: exponential
    base_delay: 1s
  performance:
    target_latency: 6s
    max_latency: 15s

workflow:
  input_from: renewal_agent
  output_to: [audit_log]
  execution_mode: sequential
  human_in_loop: false
  routing:
    - condition: "output.recommended_actions.length > 0"
      action: notify_stakeholder

observability:
  tracing: enabled
  metrics: [latency, token_usage, insight_freshness]

security:
  input_validation: enabled
  output_sanitization: enabled
  pii_detection: enabled
  audit_logging: enabled