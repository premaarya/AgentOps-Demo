# Declarative Agent Configuration - Signature Agent

agent_id: signature
name: Contract Signature Agent
version: 1.0.0
created: 2026-03-12

model:
  provider: microsoft_foundry
  name: gpt-5.1-2026-01-15
  temperature: 0.0
  max_tokens: 1536
  top_p: 1.0
  response_format: json_schema
  timeout: 30s

prompts:
  system_prompt: prompts/signature-system.md
  output_template: templates/approval-result.json

tools:
  - name: notify_stakeholder
    mcp_server: contract-workflow-mcp
    description: Send reminders and coordinate remaining signatures
    required: true
    timeout: 10s
  - name: create_audit_entry
    mcp_server: contract-audit-mcp
    description: Record signature milestones and completion evidence
    required: false
    timeout: 10s

behavior:
  role: "Coordinate execution milestones, signature follow-ups, and completion evidence"
  boundary: "Execution tracking only - no approval logic changes"
  output_schema: config/schemas/signature-result.json
  validation:
    required_fields: [signature_status, pending_signers, next_action]
    confidence_threshold: 0.7
  retry_policy:
    max_attempts: 3
    backoff: exponential
    base_delay: 1s
  performance:
    target_latency: 5s
    max_latency: 15s

workflow:
  input_from: approval_agent
  output_to: [obligations_agent, audit_log]
  execution_mode: sequential
  human_in_loop: false
  routing:
    - condition: "output.signature_status == 'blocked'"
      action: escalate_to_human

observability:
  tracing: enabled
  metrics: [latency, token_usage, signature_cycle_time]

security:
  input_validation: enabled
  output_sanitization: enabled
  pii_detection: enabled
  audit_logging: enabled