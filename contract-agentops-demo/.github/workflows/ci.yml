name: CI

on:
  push:
    branches: [main]
    paths:
      - "contract-agentops-demo/**"
  pull_request:
    branches: [main]
    paths:
      - "contract-agentops-demo/**"

defaults:
  run:
    working-directory: contract-agentops-demo

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: contract-agentops-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
